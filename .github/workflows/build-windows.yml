name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build executables (release + debug)
        run: uv run pyinstaller layrd_sync.spec

      - name: Sync version to installer script
        shell: pwsh
        run: |
          $version = (uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          (Get-Content installer.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`"" | Set-Content installer.iss
          Write-Host "Installer version set to $version"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer.iss

      - name: Upload release exe
        uses: actions/upload-artifact@v4
        with:
          name: LayrdSync-windows
          path: dist/LayrdSync.exe

      - name: Upload debug exe
        uses: actions/upload-artifact@v4
        with:
          name: LayrdSyncDebug-windows
          path: dist/LayrdSyncDebug.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LayrdSyncSetup
          path: installer_output/LayrdSyncSetup-*.exe

      - name: Compute SHA-256 hashes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $exe_hash = (Get-FileHash dist/LayrdSync.exe -Algorithm SHA256).Hash.ToLower()
          $setup_file = Get-ChildItem installer_output/LayrdSyncSetup-*.exe | Select-Object -First 1
          $setup_hash = (Get-FileHash $setup_file.FullName -Algorithm SHA256).Hash.ToLower()
          $body = @"
          ## SHA-256 Checksums
          ``````
          LayrdSync.exe: $exe_hash
          $($setup_file.Name): $setup_hash
          ``````
          "@
          echo "RELEASE_BODY<<EOF" >> $env:GITHUB_ENV
          echo $body >> $env:GITHUB_ENV
          echo "EOF" >> $env:GITHUB_ENV

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LayrdSync.exe
            dist/LayrdSyncDebug.exe
            installer_output/LayrdSyncSetup-*.exe
          generate_release_notes: true
          body: ${{ env.RELEASE_BODY }}
